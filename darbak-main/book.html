<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>حجز رحلة دربك - دربك</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<style>
  body, * { font-family: 'Almarai', sans-serif; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
  .input-focus:focus { outline: none; border-color: #b89b7f; box-shadow: 0 0 0 3px rgba(184,155,127,0.2); }
  .hero-pattern {
    background-color: #34495e;
    background-image: linear-gradient(30deg, rgba(44,62,80,0.05) 12%, transparent 12.5%, transparent 87%, rgba(44,62,80,0.05) 87.5%, rgba(44,62,80,0.05)),
                      linear-gradient(150deg, rgba(44,62,80,0.05) 12%, transparent 12.5%, transparent 87%, rgba(44,62,80,0.05) 87.5%, rgba(44,62,80,0.05));
    background-size: 80px 140px;
    background-position: 0 0, 40px 70px;
  }
  /* Dark Mode Colors */
  .dark-mode body { background-color: #1e1e1e; color: #f5f5f5; }
  .dark-mode .bg-white { background-color: #2c2c2c !important; }
  .dark-mode .text-gray-700 { color: #ddd !important; }
  .dark-mode .hero-pattern { background-color: #222; }
  .dark-mode header { background-color: #111 !important; }
  .dark-mode footer { background-color: #111 !important; color: #ccc; }
</style>
</head>
<body class="h-full bg-gray-100">

<!-- Header -->
<header class="bg-gray-800 text-white p-6 flex justify-between items-center shadow-lg">
  <div>
    <h1 class="text-3xl font-extrabold text-beige-600" id="companyName">دربك</h1>
    <p class="text-sm" id="companySlogan">حلتك معنا.. أمان وفخامة</p>
  </div>
  <div class="flex items-center gap-3">
    <a href="index.html" class="bg-beige-600 text-white px-4 py-2 rounded-2xl font-bold flex items-center gap-2">
      <i class="fas fa-home"></i> <span id="homeText">الصفحة الرئيسية</span>
    </a>
    <button id="darkToggle" class="bg-gray-300 dark:bg-gray-700 text-gray-800 dark:text-white p-2 rounded-full text-lg">
      <i class="fas fa-moon"></i>
    </button>
    <button id="langToggle" class="bg-gray-300 dark:bg-gray-700 text-gray-800 dark:text-white p-2 rounded-full text-lg">
      <i class="fas fa-language"></i>
    </button>
  </div>
</header>

<!-- Hero Section -->
<section class="hero-pattern py-16 text-center text-white">
  <h2 class="text-4xl font-extrabold mb-4" id="heroTitle">احجز رحلتك الفاخرة الآن</h2>
  <p class="text-lg" id="heroSubtitle">خدمة نقل آمنة ومريحة بين المدن والمطارات</p>
</section>

<!-- Booking Form -->
<section class="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl p-10 -mt-16">
  <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Name -->
    <div>
      <label for="name" class="block mb-2 font-bold text-gray-700" id="labelName">
        <i class="fas fa-user ml-2 text-beige-600"></i> الاسم الكامل
      </label>
      <input type="text" id="name" required 
        onkeypress="return /^[\u0600-\u06FFa-zA-Z\s]+$/.test(event.key)" 
        onpaste="event.preventDefault(); const text = (event.clipboardData||window.clipboardData).getData('text'); this.value+=text.replace(/[0-9]/g,'');" 
        class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl" />
    </div>
    <!-- Phone -->
    <div>
      <label for="phone" class="block mb-2 font-bold text-gray-700" id="labelPhone">
        <i class="fas fa-phone ml-2 text-beige-600"></i> رقم الجوال
      </label>
      <input type="tel" id="phone" required maxlength="15" placeholder="أدخل رقم الجوال" 
        class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');"
        onpaste="event.preventDefault(); const paste = (event.clipboardData || window.clipboardData).getData('text'); this.value += paste.replace(/[^0-9]/g,'');" />
    </div>
    <!-- From City -->
    <div>
      <label for="fromCity" class="block mb-2 font-bold text-gray-700" id="labelFromCity">
        <i class="fas fa-map-marker-alt ml-2 text-beige-600"></i> من مدينة
      </label>
      <select id="fromCity" required class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl">
        <option value="" selected id="fromCityOption">اختر المدينة</option>
        <option value="الرياض">الرياض</option>
        <option value="جدة">جدة</option>
        <option value="مكة">مكة المكرمة</option>
        <option value="المدينة">المدينة المنورة</option>
      </select>
    </div>
    <!-- To City -->
    <div>
      <label for="toCity" class="block mb-2 font-bold text-gray-700" id="labelToCity">
        <i class="fas fa-map-marker-alt ml-2 text-beige-600"></i> إلى مدينة
      </label>
      <select id="toCity" required class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl">
        <option value="" selected id="toCityOption">اختر المدينة</option>
        <option value="الرياض">الرياض</option>
        <option value="جدة">جدة</option>
        <option value="مكة">مكة المكرمة</option>
        <option value="المدينة">المدينة المنورة</option>
      </select>
    </div>
    <!-- Date -->
    <div>
      <label for="tripDate" class="block mb-2 font-bold text-gray-700" id="labelDate">
        <i class="fas fa-calendar ml-2 text-beige-600"></i> تاريخ الرحلة
      </label>
      <input type="date" id="tripDate" required class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl" />
    </div>
    <!-- Time -->
    <div>
      <label for="tripTime" class="block mb-2 font-bold text-gray-700" id="labelTime">
        <i class="fas fa-clock ml-2 text-beige-600"></i> وقت الرحلة
      </label>
      <input type="time" id="tripTime" required class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl" />
    </div>
    <!-- Passengers -->
    <div>
      <label for="passengers" class="block mb-2 font-bold text-gray-700" id="labelPassengers">
        <i class="fas fa-users ml-2 text-beige-600"></i> عدد المسافرين
      </label>
      <select id="passengers" required class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl">
        <option value="1" selected>1 شخص</option>
        <option value="2">2 شخص</option>
        <option value="3">3 أشخاص</option>
        <option value="4">4 أشخاص</option>
        <option value="5">5 أشخاص</option>
        <option value="6">6+ أشخاص</option>
      </select>
    </div>
    <!-- Car Type -->
    <div>
      <label for="carType" class="block mb-2 font-bold text-gray-700" id="labelCarType">
        <i class="fas fa-car-side ml-2 text-beige-600"></i> نوع السيارة
      </label>
      <select id="carType" required class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl">
        <option value="" selected id="carOption">اختر السيارة</option>
        <option value="Toyota Camry 2025">Toyota Camry 2025</option>
        <option value="Land Cruiser 2025">Land Cruiser 2025</option>
        <option value="Mercedes S-Class 2025">Mercedes S-Class 2025</option>
        <option value="Lexus LS 2025">Lexus LS 2025</option>
        <option value="Hyundai Staria 2025">Hyundai Staria 2025</option>
        <option value="GMC Yukon 2025">GMC Yukon 2025</option>
        <option value="Toyota Hiace 2025">Toyota Hiace 2025</option>
        <option value="Ford Taurus 2025">Ford Taurus 2025</option>
        <option value="Lexus LX 570 2025">Lexus LX 570 2025</option>
        <option value="Toyota Crown 2025">Toyota Crown 2025</option>
        <option value="Mercedes-Benz V-Class 2025">Mercedes-Benz V-Class 2025</option>
      </select>
    </div>
    <!-- Trip Type -->
    <div>
      <label for="tripType" class="block mb-2 font-bold text-gray-700" id="labelTripType">
        <i class="fas fa-car ml-2 text-beige-600"></i> نوع الرحلة
      </label>
      <select id="tripType" required class="input-focus w-full p-4 border-2 border-gray-300 rounded-xl">
        <option value="رحلة فردية" selected>رحلة فردية</option>
        <option value="رحلة جماعية">رحلة جماعية</option>
        <option value="VIP">VIP</option>
      </select>
    </div>
    <!-- Submit -->
    <div class="md:col-span-2 text-center mt-4">
      <button type="submit" class="bg-green-500 text-white px-6 py-3 rounded-2xl font-bold hover:bg-green-600 transition-all" id="submitBtn">
        <i class="fab fa-whatsapp ml-2"></i> إرسال الحجز عبر واتساب
      </button>
    </div>
  </form>
</section>

<script>
const bookingForm = document.getElementById('bookingForm');
bookingForm.addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const fromCity = document.getElementById('fromCity').value;
  const toCity = document.getElementById('toCity').value;
  const tripDate = document.getElementById('tripDate').value;
  const tripTime = document.getElementById('tripTime').value;
  const passengers = document.getElementById('passengers').value;
  const tripType = document.getElementById('tripType').value;
  const carType = document.getElementById('carType').value;

  const message = `🎫 حجز رحلة جديدة - دربك
👤 الاسم: ${name}
📱 الجوال: ${phone}
📍 من: ${fromCity}
📍 إلى: ${toCity}
📅 التاريخ: ${tripDate}
⏰ الوقت: ${tripTime}
👥 عدد المسافرين: ${passengers}
🚙 نوع السيارة: ${carType}
✨ نوع الرحلة: ${tripType}`;

  const whatsappURL = `https://wa.me/966546301944?text=${encodeURIComponent(message)}`;
  window.open(whatsappURL, '_blank');
});

// Dark Mode Toggle
const darkToggle = document.getElementById('darkToggle');
darkToggle.addEventListener('click', function(){
  document.body.classList.toggle('dark-mode');
  const icon = darkToggle.querySelector('i');
  if(document.body.classList.contains('dark-mode')){
    icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
  } else {
    icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
  }
});

// Language Toggle
let isArabic = true;
const langToggle = document.getElementById('langToggle');
langToggle.addEventListener('click', function(){
  isArabic = !isArabic;
  if(isArabic){
    document.body.dir = "rtl";
    document.getElementById('companyName').innerText = "دربك";
    document.getElementById('companySlogan').innerText = "حلتك معنا.. أمان وفخامة";
    document.getElementById('homeText').innerText = "الصفحة الرئيسية";
    document.getElementById('heroTitle').innerText = "احجز رحلتك الفاخرة الآن";
    document.getElementById('heroSubtitle').innerText = "خدمة نقل آمنة ومريحة بين المدن والمطارات";
    document.getElementById('labelName').innerText = "الاسم الكامل";
    document.getElementById('labelPhone').innerText = "رقم الجوال";
    document.getElementById('labelFromCity').innerText = "من مدينة";
    document.getElementById('fromCityOption').innerText = "اختر المدينة";
    document.getElementById('labelToCity').innerText = "إلى مدينة";
    document.getElementById('toCityOption').innerText = "اختر المدينة";
    document.getElementById('labelDate').innerText = "تاريخ الرحلة";
    document.getElementById('labelTime').innerText = "وقت الرحلة";
    document.getElementById('labelPassengers').innerText = "عدد المسافرين";
    document.getElementById('labelCarType').innerText = "نوع السيارة";
    document.getElementById('carOption').innerText = "اختر السيارة";
    document.getElementById('labelTripType').innerText = "نوع الرحلة";
    document.getElementById('submitBtn').innerHTML = '<i class="fab fa-whatsapp ml-2"></i> إرسال الحجز عبر واتساب';
  } else {
    document.body.dir = "ltr";
    document.getElementById('companyName').innerText = "Darbak";
    document.getElementById('companySlogan').innerText = "Luxury & Safe Transport";
    document.getElementById('homeText').innerText = "Home";
    document.getElementById('heroTitle').innerText = "Book Your Luxury Trip Now";
    document.getElementById('heroSubtitle').innerText = "Safe and comfortable transport between cities and airports";
    document.getElementById('labelName').innerText = "Full Name";
    document.getElementById('labelPhone').innerText = "Phone Number";
    document.getElementById('labelFromCity').innerText = "From City";
    document.getElementById('fromCityOption').innerText = "Select City";
    document.getElementById('labelToCity').innerText = "To City";
    document.getElementById('toCityOption').innerText = "Select City";
    document.getElementById('labelDate').innerText = "Trip Date";
    document.getElementById('labelTime').innerText = "Trip Time";
    document.getElementById('labelPassengers').innerText = "Passengers";
    document.getElementById('labelCarType').innerText = "Car Type";
    document.getElementById('carOption').innerText = "Select Car";
    document.getElementById('labelTripType').innerText = "Trip Type";
    document.getElementById('submitBtn').innerHTML = '<i class="fab fa-whatsapp ml-2"></i> Send Booking via WhatsApp';
  }
});
</script>

</body>
</html>
